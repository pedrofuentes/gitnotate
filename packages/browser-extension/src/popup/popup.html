<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gitnotate</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <h1>Gitnotate</h1>
      <p class="gn-subtitle">Sub-line commenting for GitHub PRs</p>

      <!-- Status section -->
      <div id="gn-status" class="gn-section">
        <p id="gn-status-text" class="gn-label">Ready — select text in a PR diff to comment</p>
      </div>

      <!-- Enabled repos section -->
      <div id="gn-repos" class="gn-section">
        <h2 class="gn-section-title">Enabled Repositories</h2>
        <div id="gn-repo-list">
          <p class="gn-muted">No repos enabled yet. Visit a PR and click "Enable" when prompted.</p>
        </div>
      </div>

      <!-- Highlight style section -->
      <div id="gn-style" class="gn-section">
        <h2 class="gn-section-title">Highlight Style</h2>
        <select id="gn-style-select" class="gn-select">
          <option value="dashed">Dashed + subtle tint</option>
          <option value="underline">Underline only</option>
          <option value="background">Background fill</option>
        </select>
      </div>

      <!-- Blocked repos section -->
      <div id="gn-blocked" class="gn-section">
        <h2 class="gn-section-title">Blocked Repositories</h2>
        <div id="gn-blocked-list">
          <p class="gn-muted">No blocked repos.</p>
        </div>
      </div>
    </div>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
