name: Release VSCode Extension

on:
  push:
    tags: ["vscode-v*"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release VSCode Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @gitnotate/core build && pnpm --filter @gitnotate/core test && pnpm --filter gitnotate test

      - name: Build
        run: pnpm build

      - name: Package VSCode extension
        run: cd packages/vscode-extension && npx @vscode/vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: cd packages/vscode-extension && npx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: env.OVSX_PAT != ''
        run: cd packages/vscode-extension && npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: packages/vscode-extension/*.vsix
